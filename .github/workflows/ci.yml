name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  ASPNETCORE_ENVIRONMENT: Development

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wex_corporate_test
          POSTGRES_USER: wex_user
          POSTGRES_PASSWORD: wex_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore WEX.CorporatePayments.sln

      - name: Check code formatting
        run: dotnet format WEX.CorporatePayments.sln --verify-no-changes --severity warn

      - name: Build
        run: dotnet build WEX.CorporatePayments.sln --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/WEX.Domain.Tests/WEX.Domain.Tests.csproj --no-build -c Release --logger "trx;LogFileName=domain-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/WEX.Application.Tests/WEX.Application.Tests.csproj --no-build -c Release --logger "trx;LogFileName=application-results.trx" --collect:"XPlat Code Coverage"

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=wex_corporate_test;Username=wex_user;Password=wex_test_password"
        run: |
          dotnet test tests/WEX.Infrastructure.Tests/WEX.Infrastructure.Tests.csproj --no-build -c Release --logger "trx;LogFileName=infra-results.trx"
          dotnet test tests/WEX.API.IntegrationTests/WEX.API.IntegrationTests.csproj --no-build -c Release --logger "trx;LogFileName=api-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx
